name: Pipeline CI/CD Portfolio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  tests:
    name: Tests automatiques
    runs-on: ubuntu-latest
    steps:
    - name: Recuperer le code
      uses: actions/checkout@v3
    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Installer dependances
      run: pip install flask pytest
    - name: Lancer les tests
      run: pytest tests/test_app.py -v

  verification-code:
    name: Verification du code
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - name: Recuperer le code
      uses: actions/checkout@v3
    - name: Verifier app.py
      run: |
        if [ -f app/app.py ]; then
          echo "app.py existe"
        else
          echo "app.py introuvable"
          exit 1
        fi
        LIGNES=$(wc -l < app/app.py)
        echo "Nombre de lignes : $LIGNES"
        echo "Verification terminee !"

  build-docker:
    name: Build et Push Docker
    runs-on: ubuntu-latest
    needs: [tests, verification-code]
    steps:
    - name: Recuperer le code
      uses: actions/checkout@v3
    - name: Connexion Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build et Push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          jihenezgolli/portfolio-app:latest
          jihenezgolli/portfolio-app:${{ github.sha }}

  notification:
    name: Notification
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
    - name: Resume pipeline
      run: |
        echo "Pipeline termine avec succes !"
        echo "Image : jihenezgolli/portfolio-app:latest"
        echo "Commit : ${{ github.sha }}"
        echo "Pret pour deploiement Kubernetes !"
