apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-deploy
  namespace: portfolio
spec:
  replicas: 3
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio-container
        image: jihenezgolli/portfolio-app:v1
        ports:
        - containerPort: 8000
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: APP_NAME
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: APP_VERSION
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: APP_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: PORT
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: SECRET_KEY
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: API_TOKEN
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
          successThreshold: 1
